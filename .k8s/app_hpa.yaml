apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sre-autoscaler
  labels:
    app: sre-frontend
spec:
  scaleTargetRef: 
    apiVersion: apps/v1
    kind: Deployment
    name: sre-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics: 
    - type: Resource
      resource: 
        name: cpu
        target: 
          type: Utilization
          averageUtilization: 70      

      
