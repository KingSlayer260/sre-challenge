apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-deployment
  labels:
    app: sre-frontend
spec:
  selector:
    matchLabels:
      app: sre-frontend
  template:
    metadata:
      labels:
        app: sre-frontend
    spec:
      containers:
      - name: sre-app
        image: sre-challenge:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: secret_key
        - name: DB_HOST
          value: db
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: database
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password

