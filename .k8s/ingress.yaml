apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sre-ingress
  annotations:
    nginx.ingress.kubernetes.io/server-snippet: |
      location /metrics {
        return 403;
      }
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sre-service
            port:
              number: 5000
