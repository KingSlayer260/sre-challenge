apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sre-ingress
spec:
  rules:
  - http:
      paths:
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: metrics-blackhole
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sre-service
            port:
              number: 5000
