---
# https://www.digitalocean.com/community/tutorials/how-to-use-ansible-to-install-and-set-up-docker-on-ubuntu-20-04
- name: Wait for cloud-init
  ansible.builtin.command: cloud-init status --wait
  timeout: 300
  register: cloud_init_status
  failed_when: false

- name: Install required system packages
  apt:
    pkg:
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - python3-pip
      - python3-venv
      - python3-setuptools
    state: latest
    update_cache: true

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: true

- name: De-armor Docker GPG key for APT
  command: gpg --dearmor --yes --output /etc/apt/keyrings/docker.gpg /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Update apt and install Docker Engine
  apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: latest
    update_cache: true

- name: Add VM user to docker group
  ansible.builtin.user:
    name: "{{ vm_user }}"
    groups: docker
    append: yes

- name: Reset SSH connection to apply docker group
  ansible.builtin.meta: reset_connection

- name: Verify docker group permissions
  ansible.builtin.command: docker ps
  become: false
  register: docker_perm_check
  changed_when: false
  failed_when: docker_perm_check.rc != 0