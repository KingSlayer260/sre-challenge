---
- name: Install required packages
  ansible.builtin.package:
    name:
      - curl
      - conntrack
      - socat
    state: present

- name: Detect architecture
  ansible.builtin.set_fact:
    arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Download minikube binary
  ansible.builtin.get_url:
    url: "https://storage.googleapis.com/minikube/releases/v{{ minikube_version }}/minikube-linux-{{ arch }}"
    dest: /usr/local/bin/minikube
    mode: '0755'

- name: Download kubectl
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/{{ arch }}/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'

- name: Verify installation
  ansible.builtin.command: minikube version
  register: minikube_ver

- name: Show version
  ansible.builtin.debug:
    msg: "{{ minikube_ver.stdout }}"

- name: Check if minikube is running
  ansible.builtin.command: minikube status
  register: minikube_status
  failed_when: false
  become_user: "{{ vm_user }}"

- name: Get actual resources of the running minikube container
  ansible.builtin.shell: >
    docker inspect minikube | python3 -c
    "import json,sys; d=json.load(sys.stdin)[0]['HostConfig']; print(d['Memory'], d['NanoCpus'])"
  register: minikube_actual_resources
  failed_when: false
  changed_when: false
  become_user: "{{ vm_user }}"

- name: Determine if minikube needs to be (re)created
  ansible.builtin.set_fact:
    minikube_needs_recreate: >-
      {{
        minikube_status.rc != 0
        or 'apiserver: Running' not in minikube_status.stdout
        or minikube_actual_resources.rc != 0
        or (minikube_actual_resources.stdout.split()[0] | int) != (minikube_memory | int * 1024 * 1024)
        or (minikube_actual_resources.stdout.split()[1] | int) != (minikube_cpus | int * 1000000000)
      }}

- name: Delete existing minikube cluster
  ansible.builtin.command: minikube delete
  become_user: "{{ vm_user }}"
  when: minikube_needs_recreate
  failed_when: false
  changed_when: true

- name: Start minikube cluster
  ansible.builtin.command: minikube start --driver=docker --kubernetes-version=v{{ kubectl_version }} --memory={{ minikube_memory }} --cpus={{ minikube_cpus }}
  become_user: "{{ vm_user }}"
  when: minikube_needs_recreate
  async: 600
  poll: 30

- name: Enable useful addons
  ansible.builtin.command:
    cmd: "minikube addons enable {{ item }}"
  loop:
    - metrics-server
    - ingress
  become: false
  when: minikube_needs_recreate