---
- name: Install required packages
  ansible.builtin.package:
    name:
      - curl
      - conntrack
      - socat
    state: present

- name: Detect architecture
  ansible.builtin.set_fact:
    arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Download minikube binary
  ansible.builtin.get_url:
    url: "https://storage.googleapis.com/minikube/releases/v{{ minikube_version }}/minikube-linux-{{ arch }}"
    dest: /usr/local/bin/minikube
    mode: '0755'

- name: Download kubectl
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/{{ arch }}/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'

- name: Verify installation
  ansible.builtin.command: minikube version
  register: minikube_ver

- name: Show version
  ansible.builtin.debug:
    msg: "{{ minikube_ver.stdout }}"

- name: Check if minikube is running
  ansible.builtin.command: minikube status
  register: minikube_status
  failed_when: false
  become_user: "{{ vm_user }}"

- name: Update minikube context if misconfigured
  ansible.builtin.command: minikube update-context
  when: "'Misconfigured' in minikube_status.stdout"
  become_user: "{{ vm_user }}"
  changed_when: true

- name: Stop minikube if unhealthy
  ansible.builtin.command: minikube stop
  when: >
    'apiserver: Running' not in minikube_status.stdout
    or minikube_status.rc != 0
    or 'rror' in minikube_status.stdout
    or 'rror' in minikube_status.stderr
  become_user: "{{ vm_user }}"
  failed_when: false
  changed_when: true

- name: Start minikube cluster
  ansible.builtin.command: minikube start --driver=docker --kubernetes-version=v{{ kubectl_version }} --memory={{ minikube_memory }} --cpus={{ minikube_cpus }}
  when: >
    'apiserver: Running' not in minikube_status.stdout
    or minikube_status.rc != 0
    or 'rror' in minikube_status.stdout
    or 'rror' in minikube_status.stderr
  become_user: "{{ vm_user }}"
  async: 600
  poll: 30

- name: Enable useful addons
  ansible.builtin.command:
    cmd: "minikube addons enable {{ item }}"
  loop:
    - metrics-server
    - ingress
  become: false