---
- name: Install Helm
  ansible.builtin.shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Add prometheus-community repo
  ansible.builtin.command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  become_user: "{{ vm_user }}"

- name: Update helm repos
  ansible.builtin.command: helm repo update
  become_user: "{{ vm_user }}"

- name: Create monitoring namespace
  ansible.builtin.command: kubectl create namespace monitoring
  become_user: "{{ vm_user }}"
  register: create_ns
  retries: 3
  delay: 10
  until: create_ns.rc == 0 or 'AlreadyExists' in create_ns.stderr
  failed_when: create_ns.rc != 0 and 'AlreadyExists' not in create_ns.stderr

- name: Install kube-prometheus-stack
  ansible.builtin.command: >
    helm upgrade --install monitoring prometheus-community/kube-prometheus-stack
    --namespace monitoring
    --set "grafana.grafana\.ini.server.root_url=http://{{ vm_ip.split('/')[0] }}:3000/"
  become_user: "{{ vm_user }}"
  environment:
    KUBECONFIG: /home/{{ vm_user }}/.kube/config
  register: helm_install
  retries: 3
  delay: 20
  until: helm_install.rc == 0
