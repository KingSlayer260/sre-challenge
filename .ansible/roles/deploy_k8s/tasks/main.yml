---
- name: Create app directory
  ansible.builtin.file:
    path: /opt/sre-challenge/app
    state: directory
    mode: '0755'

- name: Copy app files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../app/"
    dest: /opt/sre-challenge/app/
    mode: preserve

- name: Build Docker image
  community.docker.docker_image:
    name: sre-challenge
    tag: latest
    build:
      path: /opt/sre-challenge/app
    source: build
    force_source: true

- name: Save image to tar
  community.docker.docker_image:
    name: sre-challenge:latest
    archive_path: /tmp/sre-challenge.tar
    source: local

- name: Load image into Minikube
  ansible.builtin.command: minikube image load /tmp/sre-challenge.tar
  become_user: "{{ vm_user }}"
  changed_when: true

- name: Create manifests directory
  ansible.builtin.file:
    path: /opt/sre-challenge/k8s
    state: directory
    mode: '0755'

- name: Copy Kubernetes manifests
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../.k8s/"
    dest: /opt/sre-challenge/k8s/
    mode: preserve

- name: Generate postgres secret
  ansible.builtin.template:
    src: postgres-secret.j2
    dest: /opt/sre-challenge/k8s/postgres-secret.yml
    mode: '0600'
    owner: "{{ vm_user }}"

- name: Generate app secret
  ansible.builtin.template:
    src: app-secret.j2
    dest: /opt/sre-challenge/k8s/app-secret.yml
    mode: '0600'
    owner: "{{ vm_user }}"

- name: Apply manifests
  ansible.builtin.command: kubectl apply -f /opt/sre-challenge/k8s/
  become_user: "{{ vm_user }}"
  changed_when: true

- name: Restart app deployment to pick up new image
  ansible.builtin.command: kubectl rollout restart deployment/sre-deployment
  become_user: "{{ vm_user }}"
  changed_when: true

- name: Get minikube IP
  ansible.builtin.command: minikube ip
  become_user: "{{ vm_user }}"
  register: minikube_ip
  changed_when: false

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Configure nginx reverse proxy
  ansible.builtin.copy:
    dest: /etc/nginx/sites-available/sre-challenge
    mode: '0644'
    content: |
      server {
          listen 3000;
          location / {
              proxy_pass http://{{ minikube_ip.stdout }}:80;
              proxy_set_header Host grafana.local;
              proxy_set_header X-Forwarded-Host $host:$server_port;
          }
      }

- name: Enable nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/sre-challenge
    dest: /etc/nginx/sites-enabled/sre-challenge
    state: link

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
