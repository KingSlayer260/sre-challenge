---
- name: Create app directory
  ansible.builtin.file:
    path: /opt/sre-challenge/app
    state: directory
    mode: '0755'

- name: Copy app files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../app/"
    dest: /opt/sre-challenge/app/
    mode: preserve

- name: Build Docker image
  community.docker.docker_image:
    name: sre-challenge
    tag: latest
    build:
      path: /opt/sre-challenge/app
    source: build
    force_source: true

- name: Save image to tar
  community.docker.docker_image:
    name: sre-challenge:latest
    archive_path: /tmp/sre-challenge.tar
    source: local

- name: Load image into Minikube
  ansible.builtin.command: minikube image load /tmp/sre-challenge.tar
  become_user: "{{ vm_user }}"
  changed_when: true

- name: Create manifests directory
  ansible.builtin.file:
    path: /opt/sre-challenge/k8s
    state: directory
    mode: '0755'

- name: Copy Kubernetes manifests
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../.k8s/"
    dest: /opt/sre-challenge/k8s/
    mode: preserve

- name: Generate postgres secret
  ansible.builtin.template:
    src: postgres-secret.j2
    dest: /opt/sre-challenge/k8s/postgres-secret.yml
    mode: '0600'
    owner: "{{ vm_user }}"

- name: Generate app secret
  ansible.builtin.template:
    src: app-secret.j2
    dest: /opt/sre-challenge/k8s/app-secret.yml
    mode: '0600'
    owner: "{{ vm_user }}"

- name: Apply manifests
  ansible.builtin.command: kubectl apply -f /opt/sre-challenge/k8s/
  become_user: "{{ vm_user }}"
  changed_when: true

- name: Kill existing port-forward
  ansible.builtin.shell: pkill -f "kubectl port-forward svc/sre-service" || true
  changed_when: false

- name: Start port-forward
  ansible.builtin.shell: |
    nohup kubectl port-forward svc/sre-service 5000:5000 --address 0.0.0.0 > /tmp/port-forward.log 2>&1 &
  become_user: "{{ vm_user }}"
  changed_when: true
